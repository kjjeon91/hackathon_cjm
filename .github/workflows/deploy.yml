name: Deploy ocean-rfp-web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'ocean-rfp-web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install & build
        working-directory: ocean-rfp-web
        run: |
          bun install
          bun run build
      # /hackathon_cjm/ocean_rfp_web/ 경로로 서빙되도록 하위 폴더에 배치
      - name: Stage site under /ocean_rfp_web
        run: |
          rm -rf _site
          mkdir -p _site/ocean_rfp_web
          cp -r ocean-rfp-web/dist/. _site/ocean_rfp_web/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

# trigger pages deploy
